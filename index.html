<!DOCTYPE html>
<html>
  <head>
    <title>Tairuzz Analytics</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      #mainContent {
        flex: 1;
        display: none;
        flex-direction: column;
      }

      #reportContainer {
        flex: 1;
        width: 100%;
        display: none;
      }

      #loader {
        flex: 1;
        display: none;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        font-weight: 600;
      }
    </style>
  </head>

  <body>

    <div style="padding:20px; background:#f5f5f5; border-bottom:1px solid #ddd;">
      <h1 style="margin:0;">Tairuzz Analytics</h1>
      <p style="margin:5px 0 0;">Your embedded football analytics dashboard</p>
      <p>DEPLOY TEST</p>
    </div>

    <div id="mainContent">
      <div id="navBar" style="padding:10px; background:#fafafa; border-bottom:1px solid #eee; display:none;">
        <button id="prevPage">Previous Page</button>
        <button id="nextPage">Next Page</button>
        <button id="fullscreenBtn" style="float:right;">Full Screen</button>
      </div>

      <div id="loader">Loading report…</div>
      <div id="reportContainer"></div>
    </div>

    <!-- FIXED: Microsoft CDN (non-redirecting, stable) -->
    <script src="https://cdn.powerbi.com/libs/powerbi-client/2.19.0/powerbi.min.js"></script>

    <!-- Your embed logic -->
    <script src="index.js"></script>

  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Tairuzz Analytics</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      /* Ensure the entire page has height */
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
      }

      /* Header stays at the top */
      header {
        padding: 10px;
        background: #f5f5f5;
        border-bottom: 1px solid #ddd;
        flex: 0 0 auto;
      }

      /* Main content fills the remaining space */
      #mainContent {
        flex: 1 1 auto;
        display: flex;
        flex-direction: column;
        height: calc(100% - 70px); /* header height */
      }

      /* Loader sits above the report */
      #loader {
        padding: 20px;
        font-size: 20px;
        font-weight: 600;
        display: none;
      }

      /* Power BI container MUST fill available space */
      #embedContainer {
        flex: 1 1 auto;
        width: 100%;
        height: 100%;
        position: relative;
      }

      /* Force iframe to fill container */
      #embedContainer iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100% !important;
        height: 100% !important;
        border: none;
      }
    </style>
  </head>

  <body>

    <header>
      <h1 style="margin:0;">Tairuzz Analytics</h1>
      <p>Your embedded football analytics dashboard</p>
    </header>

    <div id="mainContent">
      <div id="loader">Loading report…</div>
      <div id="embedContainer"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/powerbi-client@2.22.0/dist/powerbi.min.js?v=999999"></script>
    <script src="index.js"></script>

  </body>
</html>

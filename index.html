<!DOCTYPE html>
<html>
  <head>
    <title>Tairuzz Analytics</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>

  <body style="margin:0; font-family:Arial, sans-serif;">

    <!-- Header -->
    <div style="padding:20px; background:#f5f5f5; border-bottom:1px solid #ddd;">
      <h1 style="margin:0;">Tairuzz Analytics</h1>
      <p style="margin:5px 0 0;">Your embedded football analytics dashboard</p>
    </div>

    <!-- LOGIN BOX -->
    <div id="loginBox" style="padding:20px;">
      <h2>Login</h2>
      <input id="email" type="text" placeholder="Email" /><br><br>
      <input id="password" type="password" placeholder="Password" /><br><br>
      <button id="loginBtn">Login</button>
      <p id="loginError" style="color:red;"></p>
    </div>

    <!-- Navigation Buttons -->
    <div style="padding:10px; background:#fafafa; border-bottom:1px solid #eee; display:none;" id="navBar">
      <button id="prevPage">Previous Page</button>
      <button id="nextPage">Next Page</button>

      <!-- Full Screen Button -->
      <button id="fullscreenBtn" style="float:right;">
        Full Screen
      </button>
    </div>

    <!-- Loader -->
    <div id="loader"
         style="height:100vh; display:none; align-items:center; justify-content:center;
                font-size:24px; font-weight:600;">
      Loading report…
    </div>

    <!-- Report Container -->
    <div id="reportContainer" style="height:100vh; width:100%; display:none;"></div>

    <!-- Power BI Client Library -->
    <script src="https://cdn.jsdelivr.net/npm/powerbi-client@2.19.0/dist/powerbi.js"></script>

    <!-- Your embed logic -->
    <script src="index.js" type="module"></script>

  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Tairuzz Analytics</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* Left navigation bar */
      #sideNav {
        position: absolute;
        left: 0;
        top: 70px; /* below header */
        width: 120px;
        height: calc(100% - 70px);
        background: #f0f0f0;
        border-right: 1px solid #ddd;
        padding-top: 10px;
        box-sizing: border-box;
        z-index: 20;
      }

      #sideNav button {
        width: 100%;
        padding: 10px;
        margin-bottom: 5px;
        background: white;
        border: 1px solid #ccc;
        cursor: pointer;
        text-align: left;
        font-size: 14px;
      }

      #sideNav button:hover {
        background: #e6e6e6;
      }

      #mainContent {
        flex: 1;
        display: flex;
        flex-direction: column;
        margin-left: 120px; /* make space for nav */
      }

      #loader {
        padding: 20px;
        font-size: 20px;
        font-weight: 600;
        display: none;
      }

      #embedContainer {
        flex: 1;
        width: 100%;
        height: 100%;
      }

      /* Force Power BI iframe full size */
      #embedContainer iframe {
        width: 100% !important;
        height: 100% !important;
        border: none;
      }
    </style>
  </head>

  <body>

    <header style="padding:10px; background:#f5f5f5; border-bottom:1px solid #ddd;">
      <h1 style="margin:0;">Tairuzz Analytics</h1>
      <p>Your embedded football analytics dashboard</p>
    </header>

    <!-- Left-side navigation -->
    <div id="sideNav">
      <button data-page="League Table">League Table</button>
      <button data-page="Profile">Profile</button>
      <button data-page="Performance Rank">Performance Rank</button>
      <button data-page="Goal Impact">Goal Impact</button>
    </div>

    <div id="mainContent">
      <div id="loader">Loading report…</div>
      <div id="embedContainer"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/powerbi-client@2.22.0/dist/powerbi.min.js?v=999999"></script>
    <script src="index.js"></script>

  </body>
</html>

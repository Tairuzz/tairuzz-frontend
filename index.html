<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Tairuzz Analytics</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      /* Full screen layout */
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: row;
        width: 100%;
        overflow: hidden; /* prevent page scrolling */
      }

      /* Left navigation bar */
      #sideNav {
        width: 200px; /* wider nav bar */
        height: 100%;
        background: #f0f0f0;
        border-right: 1px solid #ddd;
        padding: 10px 0;
        box-sizing: border-box;
        overflow-y: auto; /* scroll only inside nav */
      }

      #sideNav button {
        width: 100%;
        padding: 12px;
        margin-bottom: 6px;
        background: white;
        border: 1px solid #ccc;
        cursor: pointer;
        text-align: left;
        font-size: 14px;
      }

      #sideNav button:hover {
        background: #e6e6e6;
      }

      /* Active page highlight */
      #sideNav button.activePage {
        background: #0078d4;
        color: white;
        border-color: #005a9e;
        font-weight: bold;
      }

      /* Main content area */
      #mainContent {
        flex: 1;
        display: flex;
        flex-direction: column;
        height: 100%;
        width: calc(100% - 200px); /* report stretches fully */
      }

      #loader {
        padding: 20px;
        font-size: 20px;
        font-weight: 600;
        display: none;
      }

      #embedContainer {
        flex: 1;
        width: 100%;
        height: 100%;
        position: relative;
      }

      /* Force Power BI iframe full size */
      #embedContainer iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100% !important;
        height: 100% !important;
        border: none;
      }
    </style>
  </head>

  <body>

    <!-- Left-side navigation -->
    <div id="sideNav">
      <button data-page="League Table">League Table</button>
      <button data-page="Profile">Profile</button>
      <button data-page="Performance Rank">Performance Rank</button>
      <button data-page="Goal Impact">Goal Impact</button>
      <button data-page="Season on Season Player">Season on Season player</button>
      <button data-page="Season on Season Club">Season on season club</button>
      <button data-page="Fixture Results by xG">Fixture Results by xG</button>
      <button data-page="Team Results by xG">Team Results by xG</button>
      <button data-page="Title Race">Title Race</button>
      <button data-page="Attack Threat">Attack Threat</button>
      <button data-page="KPIs Plot">KPIs Plot</button>
      <button data-page="Performance Metrics">Performance Metrics</button>
      <button data-page="Team Fixture Performance">Team fixture Performance</button>
      <button data-page="Compare Performance Metrics">Compare Performance Metrics</button>
      <button data-page="Goal Placement">Goal Placement</button>
      <button data-page="Goal Categories">Goal Categories</button>
      <button data-page="Goal Categories2">Goal Categories2</button>
      <button data-page="Goal Analysis">Goal Analysis</button>
    </div>

    <div id="mainContent">
      <div id="loader">Loading report…</div>
      <div id="embedContainer"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/powerbi-client@2.22.0/dist/powerbi.min.js?v=999999"></script>
    <script src="index.js"></script>

  </body>
</html>

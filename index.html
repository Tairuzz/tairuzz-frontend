
<!DOCTYPE html>
<html>
  <head>
    <title>Tairuzz Analytics</title>
    <p>DEPLOY TEST</p>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      #mainContent {
        flex: 1;
        display: none; /* hidden until login */
        flex-direction: column;
      }

      #reportContainer {
        flex: 1;
        width: 100%;
        display: none; /* hidden until report loads */
      }

      #loader {
        flex: 1;
        display: none; /* hidden until report loads */
        align-items: center;
        justify-content: center;
        font-size: 24px;
        font-weight: 600;
      }
    </style>
  </head>

  <body>

    <!-- Header -->
    <div style="padding:20px; background:#f5f5f5; border-bottom:1px solid #ddd;">
      <h1 style="margin:0;">Tairuzz Analytics</h1>
      <p style="margin:5px 0 0;">Your embedded football analytics dashboard</p>
    </div>

    <!-- LOGIN BOX -->
    <div id="loginBox" style="padding:20px;">
      <h2>Login</h2>
      <input id="email" type="text" placeholder="Email" /><br><br>
      <input id="password" type="password" placeholder="Password" /><br><br>
      <button id="loginBtn">Login</button>
      <p id="loginError" style="color:red;"></p>
    </div>

    <!-- MAIN CONTENT (hidden until login) -->
    <div id="mainContent">

      <!-- Navigation Buttons -->
      <div id="navBar" style="padding:10px; background:#fafafa; border-bottom:1px solid #eee; display:none;">
        <button id="prevPage">Previous Page</button>
        <button id="nextPage">Next Page</button>

        <button id="fullscreenBtn" style="float:right;">
          Full Screen
        </button>
      </div>

      <!-- Loader -->
      <div id="loader">Loading report…</div>

      <!-- Report Container -->
      <div id="reportContainer"></div>

    </div>

    <!-- Power BI Client Library -->
    <script src="https://cdn.jsdelivr.net/npm/powerbi-client@2.19.0/dist/powerbi.js"></script>

    <!-- Your embed logic -->
    <script src="index.js" type="module"></script>

  </body>
</html>
